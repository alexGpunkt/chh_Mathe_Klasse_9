<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#15233A">
<title>Prüfungstrainer · Mathe 9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

<header class="kopf">
  <div class="kopf-zeile">
    <a class="zurueck" href="index.html" aria-label="Zurück zur Übersicht">←</a>
    <div>
      <div class="einheit-code" id="code">PRÜFUNGSTRAINER</div>
      <h1 class="einheit-titel" id="titel">Welchen Satz?</h1>
    </div>
  </div>

  <div class="streifen-wrap">
    <div class="streifen" role="progressbar" aria-label="Fortschritt im Prüfungssatz"
         aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="streifen-fuell" id="fuell"></div>
      <div class="streifen-skala"></div>
      <div class="streifen-marke"></div>
    </div>
    <div class="streifen-legende">
      <span>0 %</span>
      <span><b id="prozent">0 %</b> · <span id="absolut">0 von 0</span></span>
      <span>100 %</span>
    </div>
  </div>

  <div class="pfadwahl" role="group" aria-label="Lernweg wählen">
    <button class="pfad-btn" data-p="A" aria-pressed="false"><span class="punkt"></span>Basis</button>
    <button class="pfad-btn" data-p="B" aria-pressed="true"><span class="punkt"></span>Standard</button>
    <button class="pfad-btn" data-p="C" aria-pressed="false"><span class="punkt"></span>Vertiefung</button>
  </div>
</header>

<main id="buehne"><p class="lade">Wird geladen …</p></main>

<details class="formelkarte" id="formelkarte">
  <summary>Formelsammlung</summary>
  <div class="formel-inhalt" id="formel-inhalt"></div>
</details>

<script src="assets/js/store.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/tracker.js"></script>
<script src="assets/js/pruefung.js"></script>
</body>
</html>
